name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          # next/font fetches fonts at build; allow it in CI
          NEXT_TELEMETRY_DISABLED: "1"

  db:
    name: db — schema applies on Postgres + pgvector
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parakh
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/parakh
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations + seed
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/migrations/0001_core.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/migrations/0002_billing.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed/0001_sources.sql

  worker:
    name: worker — import + ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: python -c "import app.main"
